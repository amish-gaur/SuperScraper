version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      REDIS_URL: redis://redis:6379/0
      ARTIFACT_ROOT: /app/artifacts
      APP_ENV: production
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A worker worker --loglevel=INFO
    env_file:
      - .env.local
    environment:
      REDIS_URL: redis://redis:6379/0
      ARTIFACT_ROOT: /app/artifacts
      APP_ENV: production
    depends_on:
      - redis
    volumes:
      - .:/app
